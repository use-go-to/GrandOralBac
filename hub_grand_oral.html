<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Grand Oral — Révision</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  :root {
    --nuit: #0f172a;
    --ardoise: #334155;
    --acier: #64748b;
    --brouillard: #94a3b8;
    --perle: #f8fafc;
    --blanc: #ffffff;
    --indigo: #4f46e5;
    --indigo-f: #e0e7ff;
    --indigo-c: #4338ca;
    --emeraude: #059669;
    --emeraude-f: #d1fae5;
    --rubis: #dc2626;
    --rubis-f: #fee2e2;
    --ambre: #d97706;
    --ambre-f: #fef3c7;
    --violet: #7c3aed;
    --violet-f: #ede9fe;
    --rose: #db2777;
    --rose-f: #fdf2f8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--nuit);
    color: var(--blanc);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #hub {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  #hub::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: 
      radial-gradient(circle at 20% 30%, rgba(79,70,229,0.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(5,150,105,0.08) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(124,58,237,0.06) 0%, transparent 50%);
    animation: float 20s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -20px) rotate(2deg); }
    66% { transform: translate(-20px, 30px) rotate(-2deg); }
  }

  .hub-header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
    z-index: 1;
  }

  .hub-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--indigo);
    background: var(--indigo-f);
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .hub-title {
    font-size: 32px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }

  .hub-title span {
    background: linear-gradient(135deg, var(--indigo), var(--violet));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hub-sub {
    font-size: 15px;
    color: var(--brouillard);
    font-weight: 400;
  }

  .hub-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 1;
  }

  .hub-card {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 24px;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
  }

  .hub-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .hub-card.math::before {
    background: linear-gradient(135deg, rgba(79,70,229,0.15), rgba(124,58,237,0.08));
  }

  .hub-card.physique::before {
    background: linear-gradient(135deg, rgba(5,150,105,0.15), rgba(217,119,6,0.08));
  }

  .hub-card:active { transform: scale(0.97); }
  .hub-card:hover::before, .hub-card:active::before { opacity: 1; }
  .hub-card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }

  .hub-card-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    position: relative;
  }

  .hub-card.math .hub-card-icon {
    background: linear-gradient(135deg, var(--indigo), var(--violet));
    box-shadow: 0 8px 24px rgba(79,70,229,0.3);
  }

  .hub-card.physique .hub-card-icon {
    background: linear-gradient(135deg, var(--emeraude), var(--ambre));
    box-shadow: 0 8px 24px rgba(5,150,105,0.3);
  }

  .hub-card-content { flex: 1; }
  .hub-card-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .hub-card-desc { font-size: 13px; color: var(--brouillard); line-height: 1.4; }

  .hub-card-arrow {
    font-size: 20px;
    color: var(--acier);
    transition: transform 0.3s, color 0.3s;
  }
  .hub-card:hover .hub-card-arrow { transform: translateX(4px); color: var(--blanc); }

  .hub-footer {
    margin-top: auto;
    padding-top: 32px;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .hub-footer p { font-size: 12px; color: var(--acier); }
  .hub-footer strong { color: var(--brouillard); }

  #reader {
    display: none;
    min-height: 100dvh;
    flex-direction: column;
    background: var(--blanc);
  }

  .reader-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid #e2e8f0;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .reader-back {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: none;
    background: var(--perle);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: var(--ardoise);
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .reader-back:active { transform: scale(0.92); background: var(--indigo-f); color: var(--indigo); }

  .reader-title {
    flex: 1;
    font-size: 15px;
    font-weight: 700;
    color: var(--nuit);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .reader-progress {
    font-size: 12px;
    font-weight: 600;
    color: var(--acier);
    background: var(--perle);
    padding: 6px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .reader-content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0;
    background: #e2e8f0;
  }

  .page-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid #e2e8f0;
    padding: 8px 16px 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 101;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .page-nav.visible { transform: translateY(0); }

  .page-nav-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: none;
    background: var(--perle);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: var(--ardoise);
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .page-nav-btn:active { transform: scale(0.92); background: var(--indigo-f); color: var(--indigo); }
  .page-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .page-nav-dots {
    flex: 1;
    display: flex;
    justify-content: center;
    gap: 8px;
  }

  .page-nav-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #cbd5e1;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    padding: 0;
  }
  .page-nav-dot.active { background: var(--indigo); width: 24px; border-radius: 4px; }

  .page-nav-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--acier);
    min-width: 50px;
    text-align: center;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hub-card { animation: fadeIn 0.5s ease-out backwards; }
  .hub-card:nth-child(1) { animation-delay: 0.1s; }
  .hub-card:nth-child(2) { animation-delay: 0.2s; }

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .page-nav { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
    #hub { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<div id="hub">
  <div class="hub-header">
    <div class="hub-badge">Grand Oral 2026</div>
    <h1 class="hub-title">Revision<br><span>Grand Oral</span></h1>
    <p class="hub-sub">Choisis ton sujet et revise partout</p>

</div>

<script>

      {
        title: 'Diagnostiquer : TEP',
        content: `
<div style="padding:20px 16px;max-width:100%;font-family:'Inter',sans-serif;color:#0f172a;font-size:15px;line-height:1.6;">
  <div style="background:#e0e7ff;border:2px solid #4f46e5;border-radius:12px;padding:16px;margin-bottom:16px;position:relative;">
    <div style="position:absolute;top:-10px;left:12px;background:#4f46e5;color:white;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 10px;border-radius:10px;">A APPRENDRE PAR COEUR</div>
    <div style="margin-top:8px;">
      <p style="font-size:14px;font-weight:700;color:#4338ca;margin-bottom:6px;">Definition de la TEP</p>
      <p style="font-size:14px;line-height:1.6;color:#334155;">La <strong>TEP</strong> (Tomographie par Emission de Positrons) produit des <strong>images en trois dimensions</strong> en detectant les rayonnements emis par un <strong>traceur radioactif</strong> injecte au patient. On visualise l'<strong>activite metabolique</strong>, pas seulement la forme des organes.</p>
    </div>
  </div>

  <div style="background:#fdf2f8;border:2px solid #db2777;border-radius:12px;padding:16px;margin-bottom:16px;position:relative;">
    <div style="position:absolute;top:-10px;left:12px;background:#db2777;color:white;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 10px;border-radius:10px;">MON HISTOIRE</div>
    <p style="font-size:14px;line-height:1.6;color:#0f172a;margin-top:6px;">Chez ma mere, la <strong>TEP au fluor-18 (FDG)</strong> permet de suivre son <strong>myelome multiple</strong>. Les medecins injectent du glucose marque au fluor-18. Les cellules cancereuses de la moelle osseuse consomment plus de sucre que les cellules saines. Elles brillent sur l'image. Cela permet de voir si la maladie progresse, meme avant que les lesions soient visibles sur une radio classique.</p>
  </div>

  <p style="font-size:12px;font-weight:700;color:#4f46e5;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;">Le principe en trois etapes</p>
  <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px;">
    <div style="background:#e0e7ff;border:1.5px solid #4f46e5;border-radius:6px;padding:8px 12px;font-size:12px;font-weight:600;color:#4338ca;text-align:center;">1. Injecter<br><span style="font-size:10px;opacity:0.7">glucose + fluor-18 = FDG</span></div>
    <div style="color:#64748b;align-self:center;font-size:18px;font-weight:700;">→</div>
    <div style="background:#ede9fe;border:1.5px solid #7c3aed;border-radius:6px;padding:8px 12px;font-size:12px;font-weight:600;color:#7c3aed;text-align:center;">2. Fixer<br><span style="font-size:10px;opacity:0.7">cellules cancereuses avales le FDG</span></div>
    <div style="color:#64748b;align-self:center;font-size:18px;font-weight:700;">→</div>
    <div style="background:#d1fae5;border:1.5px solid #059669;border-radius:6px;padding:8px 12px;font-size:12px;font-weight:600;color:#059669;text-align:center;">3. Detecter<br><span style="font-size:10px;opacity:0.7">la tumeur brille sur l'image 3D</span></div>
  </div>

  <div style="background:#e0e7ff;border:2px solid #4f46e5;border-radius:12px;padding:16px;margin-bottom:16px;">
    <p style="font-size:14px;line-height:1.6;color:#4338ca;margin-bottom:8px;">La cellule cancereuse <strong>phosphoryle le FDG</strong> (comme elle fait avec le glucose normal)... mais le FDG est <strong>indigestible</strong> : il reste <strong>bloque dans la cellule</strong>.</p>
    <p style="font-size:14px;line-height:1.6;color:#4338ca;">Plus la cellule est cancereuse → plus elle consomme de glucose → plus elle <strong>brille</strong> sur l'image TEP.</p>
  </div>

  <div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:16px;">
    <div style="background:#e0e7ff;border:1.5px solid #4f46e5;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;color:#4338ca;text-align:center;">Glucose</div>
    <div style="color:#64748b;align-self:center;font-size:14px;font-weight:700;">+</div>
    <div style="background:#fef3c7;border:1.5px solid #d97706;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;color:#d97706;text-align:center;">Fluor-18</div>
    <div style="color:#64748b;align-self:center;font-size:14px;font-weight:700;">=</div>
    <div style="background:#e0e7ff;border:1.5px solid #4f46e5;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;color:#4338ca;text-align:center;">FDG</div>
    <div style="color:#64748b;align-self:center;font-size:14px;font-weight:700;">→</div>
    <div style="background:#ede9fe;border:1.5px solid #7c3aed;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;color:#7c3aed;text-align:center;">Cellule cancereuse<br>avale le FDG</div>
    <div style="color:#64748b;align-self:center;font-size:14px;font-weight:700;">→</div>
    <div style="background:#fee2e2;border:1.5px solid #dc2626;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;color:#dc2626;text-align:center;">Bloque dedans</div>
    <div style="color:#64748b;align-self:center;font-size:14px;font-weight:700;">→</div>
    <div style="background:#d1fae5;border:1.5px solid #059669;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;color:#059669;text-align:center;">Brille sur l'image</div>
  </div>

  <div style="background:#f8fafc;border-left:4px solid #4f46e5;padding:12px 14px;border-radius:0 8px 8px 0;margin-bottom:16px;">
    <p style="font-size:13px;color:#334155;"><strong>Point cle :</strong> la TEP detecte l'<strong>activite metabolique</strong> avant meme que la tumeur soit visible sur une radio classique. C'est un outil d'<strong>aide au diagnostic</strong> : on confirme par biopsie.</p>
  </div>
</div>`
      },
      {
        title: 'Traiter : Therapies Ciblees',
        content: `
<div style="padding:20px 16px;max-width:100%;font-family:'Inter',sans-serif;color:#0f172a;font-size:15px;line-height:1.6;">
  <div style="background:#e0e7ff;border:2px solid #4f46e5;border-radius:12px;padding:16px;margin-bottom:16px;position:relative;">
    <div style="position:absolute;top:-10px;left:12px;background:#4f46e5;color:white;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 10px;border-radius:10px;">A APPRENDRE PAR COEUR</div>
    <div style="margin-top:8px;">
      <p style="font-size:14px;font-weight:700;color:#4338ca;margin-bottom:6px;">Principe fondamental</p>
      <p style="font-size:14px;line-height:1.6;color:#334155;">Les <strong>rayonnements ionisants endommagent l'ADN</strong> des cellules. Les cellules cancereuses se divisent <strong>plus rapidement</strong> → elles sont <strong>plus sensibles</strong> aux degats radio-induits. C'est la <strong>différence de radiosensibilite</strong>.</p>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
    <div style="background:#e0e7ff;border:1.5px solid #4f46e5;border-radius:8px;padding:12px;text-align:left;">
      <div style="font-size:12px;font-weight:700;color:#4f46e5;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Externe</div>
      <p style="font-size:13px;line-height:1.5;color:#334155;"><strong>Rayons X</strong> ou <strong>protons</strong> diriges depuis l'exterieur vers la tumeur. La dose est calculee pour <strong>maximiser l'effet sur la tumeur</strong> tout en <strong>protegeant les tissus sains</strong>.</p>
    </div>
    <div style="background:#ede9fe;border:1.5px solid #7c3aed;border-radius:8px;padding:12px;text-align:left;">
      <div style="font-size:12px;font-weight:700;color:#7c3aed;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Interne</div>
      <p style="font-size:13px;line-height:1.5;color:#334155;">Substance radioactive <strong>injectee</strong>. On utilise le <strong>fonctionnement naturel du corps</strong> pour cibler l'organe malade. C'est une <strong>therapie ciblee</strong>.</p>
    </div>
  </div>

  <div style="background:#fdf2f8;border:2px solid #db2777;border-radius:12px;padding:16px;margin-bottom:16px;position:relative;">
    <div style="position:absolute;top:-10px;left:12px;background:#db2777;color:white;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 10px;border-radius:10px;">MON HISTOIRE</div>
    <p style="font-size:14px;line-height:1.6;color:#0f172a;margin-top:6px;">Pour le <strong>myelome multiple</strong> de ma mere, les medecins utilisent deux approches basees sur <strong>le meme principe physique</strong> : des noyaux instables qui emettent des rayonnements. D'abord pour <strong>voir</strong>, puis pour <strong>soigner</strong>.</p>
  </div>

  <div style="background:#d1fae5;border-left:4px solid #059669;padding:12px 14px;border-radius:0 8px 8px 0;margin-bottom:12px;">
    <p style="font-size:13px;font-weight:700;color:#059669;margin-bottom:4px;">1. Voir : la TEP au fluor-18 (diagnostic)</p>
    <p style="font-size:13px;color:#334155;line-height:1.5;">On injecte du <strong>glucose marque au fluor-18</strong>. Les cellules cancereuses de la moelle osseuse consomment plus de sucre. Elles se colorent sur l'image. Les medecins voient <strong>ou</strong> est la maladie et <strong>si elle progresse</strong>.</p>
  </div>

  <div style="background:#ede9fe;border-left:4px solid #7c3aed;padding:12px 14px;border-radius:0 8px 8px 0;margin-bottom:12px;">
    <p style="font-size:13px;font-weight:700;color:#7c3aed;margin-bottom:4px;">2. Soigner : le samarium-153 (therapie interne)</p>
    <p style="font-size:13px;color:#334155;line-height:1.5;">On injecte un <strong>radio-isotope osseux</strong> (samarium-153). Il se fixe sur le <strong>tissu osseux en activite</strong> — la ou l'os se reconstruit anormalement a cause du cancer. Le rayonnement beta detruit les cellules cancereuses a proximite, sur quelques millimetres seulement.</p>
  </div>

// ════════════════════════════════════════
// LOGIQUE DE NAVIGATION
// ════════════════════════════════════════
let currentSubject = null;
let currentPage = 0;

function openSubject(subjectKey) {
  currentSubject = subjects[subjectKey];
  currentPage = 0;

  document.getElementById('hub').style.display = 'none';
  document.getElementById('reader').style.display = 'flex';
  document.getElementById('page-nav').classList.add('visible');

  document.getElementById('reader-title').textContent = currentSubject.title;
  document.title = currentSubject.title + ' — Grand Oral';

  renderPage();
  buildDots();
  updateNav();
}

function closeReader() {
  document.getElementById('hub').style.display = 'flex';
  document.getElementById('reader').style.display = 'none';
  document.getElementById('page-nav').classList.remove('visible');
  document.title = 'Grand Oral — Revision';
  currentSubject = null;
}

function renderPage() {
  const page = currentSubject.pages[currentPage];
  document.getElementById('reader-content').innerHTML = page.content;
  document.getElementById('reader-progress').textContent = (currentPage + 1) + ' / ' + currentSubject.pages.length;
  document.getElementById('page-label').textContent = (currentPage + 1) + ' / ' + currentSubject.pages.length;

  // Scroll to top
  document.getElementById('reader-content').scrollTop = 0;
}

function buildDots() {
  const dotsContainer = document.getElementById('page-dots');
  dotsContainer.innerHTML = '';

  for (let i = 0; i < currentSubject.pages.length; i++) {
    const dot = document.createElement('button');
    dot.className = 'page-nav-dot' + (i === currentPage ? ' active' : '');
    dot.setAttribute('aria-label', 'Page ' + (i + 1));
    dot.onclick = () => goToPage(i);
    dotsContainer.appendChild(dot);
  }
}

function updateNav() {
  document.getElementById('btn-prev').disabled = currentPage === 0;
  document.getElementById('btn-next').disabled = currentPage === currentSubject.pages.length - 1;

  const dots = document.querySelectorAll('.page-nav-dot');
  dots.forEach((dot, i) => {
    dot.classList.toggle('active', i === currentPage);
  });
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    renderPage();
    updateNav();
  }
}

function nextPage() {
  if (currentPage < currentSubject.pages.length - 1) {
    currentPage++;
    renderPage();
    updateNav();
  }
}

function goToPage(index) {
  currentPage = index;
  renderPage();
  updateNav();
}

// Swipe support
let touchStartX = 0;
let touchEndX = 0;

const readerContent = document.getElementById('reader-content');

readerContent.addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
}, { passive: true });

readerContent.addEventListener('touchend', e => {
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
}, { passive: true });

function handleSwipe() {
  const threshold = 60;
  if (touchEndX < touchStartX - threshold) {
    nextPage();
  }
  if (touchEndX > touchStartX + threshold) {
    prevPage();
  }
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (!currentSubject) return;
  if (e.key === 'ArrowLeft') prevPage();
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'Escape') closeReader();
});
</script>
